name: Deploy Scraping API

on:
  push:
    branches:
      - main

concurrency:
  group: scraping-api-prod
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    env:
      AWS_REGION: us-east-2
      ECR_REGISTRY: 339340413604.dkr.ecr.us-east-2.amazonaws.com
      ECR_REPOSITORY: scraping
      ECS_CLUSTER: scraping-cluster
      ECS_SERVICE: scraping-task-service
      TASK_FAMILY: scraping-task
      CONTAINER_NAME: scraping-container

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      # =========================
      # BUILD IMAGE (SEM latest)
      # =========================
      - name: Build and Push Docker Image
        run: |
          IMAGE_SHA=${ECR_REGISTRY}/${ECR_REPOSITORY}:${GITHUB_SHA}

          docker build -t $IMAGE_SHA .
          docker push $IMAGE_SHA

          echo "IMAGE_SHA=$IMAGE_SHA" >> $GITHUB_ENV

      # =========================
      # GET TASK DEF
      # =========================
      - name: Download Current Task Definition
        run: |
          aws ecs describe-task-definition \
            --task-definition $TASK_FAMILY \
            --query taskDefinition \
            --output json > task-definition.json

      # =========================
      # UPDATE TASK DEF (image only)
      # =========================
      - name: Update Task Definition
        run: |
          jq \
            --arg IMAGE "$IMAGE_SHA" \
            '
            .containerDefinitions |= map(
              if .name == env.CONTAINER_NAME then
                .image = $IMAGE
              else .
              end
            )
            | del(
                .taskDefinitionArn,
                .revision,
                .status,
                .requiresAttributes,
                .compatibilities,
                .registeredAt,
                .registeredBy
              )
            ' task-definition.json > task-def-updated.json

      # =========================
      # DEPLOY TASK DEFINITION
      # =========================
      - name: Deploy ECS Task Definition
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: task-def-updated.json
          service: ${{ env.ECS_SERVICE }}
          cluster: ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true

      # =========================
      # FORCE REAL ROLLOUT (IMPORTANTE)
      # =========================
      - name: Force new deployment
        run: |
          aws ecs update-service \
            --cluster $ECS_CLUSTER \
            --service $ECS_SERVICE \
            --force-new-deployment
