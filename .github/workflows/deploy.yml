name: Deploy Scraping API

on:
  push:
    branches:
      - main

concurrency:
  group: scraping-api-prod
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    env:
      AWS_REGION: sa-east-1
      ECR_REGISTRY: 339340413604.dkr.ecr.sa-east-1.amazonaws.com
      ECR_REPOSITORY: scraping
      ECS_CLUSTER: robo-cluster
      ECS_SERVICE: scraping-task-service
      TASK_FAMILY: scraping-task
      CONTAINER_NAME: scraping-container

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and Push Docker Image
        run: |
          IMAGE_SHA=${ECR_REGISTRY}/${ECR_REPOSITORY}:${GITHUB_SHA}
          IMAGE_LATEST=${ECR_REGISTRY}/${ECR_REPOSITORY}:latest

          docker build -t $IMAGE_SHA -t $IMAGE_LATEST .
          docker push $IMAGE_SHA
          docker push $IMAGE_LATEST

          echo "IMAGE_SHA=$IMAGE_SHA" >> $GITHUB_ENV

      - name: Validate Redis URL (fail fast)
        run: |
          echo "Checking REDIS_URL from Secrets Manager..."

          REDIS_URL=$(aws secretsmanager get-secret-value \
            --secret-id scraping/prod \
            --query SecretString \
            --output text | jq -r .REDIS_URL)

          echo "REDIS_URL=$REDIS_URL"

          if [[ "$REDIS_URL" != *"robo-redis"* ]]; then
            echo "❌ INVALID REDIS_URL detected!"
            exit 1
          fi

      - name: Download Current Task Definition
        run: |
          aws ecs describe-task-definition \
            --task-definition $TASK_FAMILY \
            --query taskDefinition \
            --output json > task-definition.json

      - name: Update Task Definition (safe)
        run: |
          jq \
            --arg IMAGE "$IMAGE_SHA" \
            --arg TASK_ROLE "arn:aws:iam::339340413604:role/scraping-task-role" \
            --arg EXEC_ROLE "arn:aws:iam::339340413604:role/ecsTaskExecutionRole" \
            '
            .taskRoleArn = $TASK_ROLE
            | .executionRoleArn = $EXEC_ROLE
            | .containerDefinitions |= map(
              if .name == env.CONTAINER_NAME then
                .image = $IMAGE
              else .
              end
            )
            | del(
                .taskDefinitionArn,
                .revision,
                .status,
                .requiresAttributes,
                .compatibilities,
                .registeredAt,
                .registeredBy
              )
            ' task-definition.json > task-def-updated.json

      - name: Deploy ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: task-def-updated.json
          service: ${{ env.ECS_SERVICE }}
          cluster: ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true
