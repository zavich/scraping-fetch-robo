name: Deploy Scraping API

on:
  push:
    branches:
      - main

concurrency:
  group: scraping-api-prod
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    env:
      AWS_REGION: us-east-2
      ECR_REGISTRY: 339340413604.dkr.ecr.us-east-2.amazonaws.com
      ECR_REPOSITORY: scraping
      ECS_CLUSTER: scraping-cluster
      ECS_SERVICE: scraping-task-service
      TASK_FAMILY: scraping-task
      CONTAINER_NAME: scraping-container

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # =========================
      # AWS CREDENTIALS
      # =========================
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      # =========================
      # LOGIN ECR
      # =========================
      - name: Login Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      # =========================
      # BUILD IMAGE
      # =========================
      - name: Build and Push Docker Image
        run: |
          IMAGE_TAG=${GITHUB_SHA}
          IMAGE_URI=${ECR_REGISTRY}/${ECR_REPOSITORY}:${IMAGE_TAG}

          docker build -t $IMAGE_URI .
          docker push $IMAGE_URI

          echo "IMAGE_URI=$IMAGE_URI" >> $GITHUB_ENV

      # =========================
      # VALIDATION STEP (IMPORTANTE 🔥)
      # =========================
      - name: Validate Redis URL (fail fast)
        run: |
          echo "Checking REDIS_URL from Secrets Manager..."

          REDIS_URL=$(aws secretsmanager get-secret-value \
            --secret-id scraping/prod \
            --query SecretString \
            --output text | jq -r .REDIS_URL)

          echo "REDIS_URL=$REDIS_URL"

          if [[ "$REDIS_URL" != *"scraping-redis-prod"* ]]; then
            echo "❌ INVALID REDIS_URL detected!"
            exit 1
          fi

      # =========================
      # GET TASK DEFINITION
      # =========================
      - name: Download Current Task Definition
        run: |
          aws ecs describe-task-definition \
            --task-definition $TASK_FAMILY \
            --query taskDefinition \
            --output json > task-definition.json

      # =========================
      # UPDATE TASK DEFINITION
      # =========================
      - name: Update Task Definition
        run: |
          jq \
            --arg IMAGE "$IMAGE_URI" \
            '
            .containerDefinitions |= map(
              if .name == env.CONTAINER_NAME then
                .image = $IMAGE
              else .
              end
            )
            | del(
                .taskDefinitionArn,
                .revision,
                .status,
                .requiresAttributes,
                .compatibilities,
                .registeredAt,
                .registeredBy
              )
            ' task-definition.json > task-def-updated.json

      # =========================
      # DEPLOY
      # =========================
      - name: Deploy ECS Task Definition
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: task-def-updated.json
          service: ${{ env.ECS_SERVICE }}
          cluster: ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true

      # =========================
      # FORCE REDEPLOY (redundância ok)
      # =========================
      - name: Force new deployment
        run: |
          aws ecs update-service \
            --cluster $ECS_CLUSTER \
            --service $ECS_SERVICE \
            --force-new-deployment
